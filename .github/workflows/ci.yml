name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build, test and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Assemble audit
        run: ./gradlew assembleAudit assembleAuditAndroidTest --stacktrace --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Android lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Detekt
        run: ./gradlew detekt --stacktrace --no-daemon

      - name: ktlint
        run: ./gradlew ktlintCheck --stacktrace --no-daemon

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ github.sha }}-${{ github.run_id }}
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/apk/
            app/build/outputs/androidTest-results/
            build/reports/
          if-no-files-found: ignore
          retention-days: 14
