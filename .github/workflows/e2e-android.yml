name: Android E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: E2E suite to run
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke
  schedule:
    - cron: '20 6 * * *'
  push:
    branches: [ master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'scripts/**'
      - '.github/workflows/e2e-android.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-e2e:
    name: GMD audit
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select suite
        id: suite
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SUITE="smoke"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUITE="${{ inputs.suite }}"
          else
            SUITE="full"
          fi
          echo "suite=$SUITE" >> "$GITHUB_OUTPUT"

      - name: Run autonomous audit on GMD
        run: ./scripts/run-autonomous-audit.sh --suite "${{ steps.suite.outputs.suite }}"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-audit-${{ github.sha }}-${{ github.run_id }}
          path: |
            build/reports/app-audit/
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            app/build/outputs/managed_device_android_test_additional_output/
            app/build/outputs/connected_android_test_additional_output/
          if-no-files-found: ignore
          retention-days: 14
